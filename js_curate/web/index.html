<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pasture Trail Prototype</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="control-panel">
      <header class="panel-block panel-header">
        <p id="app-eyebrow" class="eyebrow">Procedural Terrain</p>
        <h1 id="app-title">Pasture Trail Prototype</h1>
        <p id="panel-copy" class="panel-copy">
          Procedural terrain, shoreline, and trail generation with in-memory scene export/import.
        </p>
      </header>

      <section class="panel-block toolbar">
        <button type="button" id="randomize-seed">Randomize Seed</button>
        <button type="button" id="reset-defaults">Reset Defaults</button>
        <button type="button" id="regenerate-scene">Regenerate</button>
        <button type="button" id="export-png">Export PNG</button>
        <button type="button" id="copy-share-url">Copy Share URL</button>
        <button type="button" id="export-scene-json">Export Scene JSON</button>
        <button type="button" id="import-scene-json">Import Scene JSON</button>
        <input type="file" id="scene-json-input" accept="application/json,.json" hidden>
      </section>

      <section class="panel-block status-card">
        <p id="status-eyebrow" class="eyebrow">Status</p>
        <p id="status-text">Initializing...</p>
      </section>

      <section class="panel-block summary-card">
        <div class="summary-head">
          <div>
            <p id="summary-eyebrow" class="eyebrow">Snapshot</p>
            <p id="scene-name" class="scene-name">PastureTrailPreview</p>
          </div>
          <span id="scene-source" class="summary-chip">procedural</span>
        </div>
        <dl id="scene-summary" class="summary-grid"></dl>
      </section>

      <section id="controls" class="controls"></section>
    </aside>

    <main class="preview-panel">
      <section class="preview-frame">
        <div class="preview-head">
          <div>
            <p id="canvas-eyebrow" class="eyebrow">Canvas</p>
            <h2 id="canvas-title">1024 x 512 Top View</h2>
          </div>
          <div class="language-picker">
            <label id="language-label" for="language-select">Language</label>
            <select id="language-select" aria-label="Language">
              <option value="ko">한국어</option>
              <option value="en">English</option>
              <option value="ja">日本語</option>
            </select>
          </div>
        </div>
        <div class="canvas-shell">
          <canvas id="preview-canvas" width="1024" height="512"></canvas>
        </div>
      </section>
    </main>
  </div>

  <script src="./params.js"></script>
  <script src="./palette.js"></script>
  <script src="./heightmap.js"></script>
  <script src="./generator.js"></script>
  <script src="./renderer.js"></script>
  <script src="./app.js"></script>
</body>
</html>
